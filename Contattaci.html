<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CONTATTACI</title>
    <link rel="stylesheet" href="Contattaci.css">
</head>
<body>
<h1>Contattaci</h1>
<center>
<form autocomplete="on">
    <table>
        <tr>
            <th><label for="name">Nome:</label></th>
            <th><input id="name" type="text" name="name" required></th>
        </tr>
        <tr>
            <td><label for="lastname"><strong>Cognome:</strong></label></td>
            <td><input id="lastname" type="text" name="lastname"></td>
        </tr>
        <tr>
            <td><label for="Email"><strong>Email:</strong></label></td>
            <td><input id="Email" type="email" name="email" required><br></td>
        </tr>
        <tr>
            <td><label for="Messaggio"><strong>Messaggio:</strong></label></td>
            <td><textarea name="Messaggio" id="Messaggio" cols="30" rows="10" required></textarea></td>
        </tr>
        <tr>
            <td>
                <button type="submit"><strong>Invia</strong></button>
            </td>
        </tr>
    </table>
</form>
</center>
</body>
</html>
